<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Auren | Comprendi l'oro in pochi secondi</title>

<style>
:root {
  --black:#0B0B0B;
  --soft-white:#F5F5F5;
  --muted:#A7A7A7;
  --gold:#C6A85A;
  --gold-light:#FFD978;
  --danger:#E66B6B;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:var(--black);
  color:var(--soft-white);
  font-family:Inter, sans-serif;
}

/* HEADER */
header{
  position:fixed;
  width:100%;
  backdrop-filter:blur(15px);
  background:rgba(0,0,0,0.7);
  z-index:10;
}

.nav{
  max-width:1200px;
  margin:auto;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 20px;
}

/* LOGO GRANDE */
.logo-img{
  height:80px;
  filter:
    drop-shadow(0 0 10px rgba(255,217,120,0.8))
    drop-shadow(0 0 30px rgba(198,168,90,0.6));
  transition:0.3s;
}

.logo-img:hover{
  transform:scale(1.05);
}

/* NAV */
.nav-links{
  display:flex;
  gap:30px;
  color:var(--muted);
}

.nav-links a:hover{
  color:var(--gold-light);
}

/* BUTTON */
.btn{
  padding:10px 20px;
  border-radius:30px;
  border:1px solid rgba(198,168,90,0.4);
}

.btn:hover{
  background:rgba(198,168,90,0.2);
}

/* HERO */
.hero{
  max-width:1200px;
  margin:auto;
  padding-top:150px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:50px;
}

h1{
  font-size:70px;
}

.gold{
  color:var(--gold-light);
}

p{
  color:var(--muted);
  margin:20px 0;
}

/* CARD */
.card{
  background:#111;
  padding:25px;
  border-radius:25px;
  border:1px solid rgba(198,168,90,0.2);
}

/* TRADINGVIEW */
.tv{
  height:140px;
}

/* METRICS */
.metrics{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  margin-top:20px;
}

.metric{
  background:#151515;
  padding:15px;
  border-radius:15px;
}

.red{color:var(--danger);}

footer{
  margin-top:80px;
  padding:20px;
  text-align:center;
  color:#666;
}

@media(max-width:900px){
  .hero{grid-template-columns:1fr;}
  .nav-links{display:none;}
  .logo-img{height:60px;}
}
</style>
</head>

<body>

<header>
  <div class="nav">

    <!-- LOGO -->
    <img src="logo.png" class="logo-img">

    <div class="nav-links">
      <a href="#">Analisi</a>
      <a href="#">Scenari</a>
      <a href="#">Premium</a>
    </div>

    <div class="btn">Accesso anticipato</div>

  </div>
</header>

<section class="hero">

<div>
<h1>Comprendi <span class="gold">l'oro</span> in pochi secondi.</h1>

<p>
Auren trasforma il mercato XAU in una lettura chiara:
trend, livelli chiave e probabilità.
</p>

<div class="btn">Vedi mercato</div>

</div>

<div class="card">

<h3>Prezzo live XAU/USD</h3>

<div class="tv">
<div class="tradingview-widget-container">
<div class="tradingview-widget-container__widget"></div>
<script src="https://s3.tradingview.com/external-embedding/embed-widget-single-quote.js" async>
{
  "symbol":"TVC:GOLD",
  "width":"100%",
  "isTransparent":true,
  "colorTheme":"dark",
  "locale":"it"
}
</script>
</div>
</div>

<div class="metrics">

<div class="metric">
Trend<br>
<b class="red">Ribassista</b>
</div>

<div class="metric">
Probabilità<br>
<b class="gold">65%</b>
</div>

<div class="metric">
Supporto<br>
<b>4600</b>
</div>

<div class="metric">
Resistenza<br>
<b>4670 - 4720</b>
</div>

</div>

</div>

</section>

<footer>
© 2026 Auren
</footer>

</body>
</html>
